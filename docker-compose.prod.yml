version: "3.8"
services:
  eruen-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9876:9876"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9876/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s